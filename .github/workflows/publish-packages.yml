name: Packages CI/CD

on:
  pull_request:
    paths:
      - 'packages/**'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
    tags:
      - 'cms-utils-v*'
      - 'cms-react-v*'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cms-utils: ${{ steps.filter.outputs.cms-utils }}
      cms-react: ${{ steps.filter.outputs.cms-react }}
      tagged-package: ${{ steps.tag-check.outputs.package }}
      tag-version: ${{ steps.tag-check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check tag
        id: tag-check
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" == cms-utils-v* ]]; then
            echo "package=cms-utils" >> $GITHUB_OUTPUT
            echo "version=${TAG#cms-utils-v}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == cms-react-v* ]]; then
            echo "package=cms-react" >> $GITHUB_OUTPUT
            echo "version=${TAG#cms-react-v}" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed packages
        uses: dorny/paths-filter@v3
        id: filter
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          filters: |
            cms-utils:
              - 'packages/cms-utils/**'
            cms-react:
              - 'packages/cms-react/**'

  cms-utils:
    needs: detect-changes
    if: needs.detect-changes.outputs.cms-utils == 'true' || needs.detect-changes.outputs.tagged-package == 'cms-utils'
    uses: ./.github/workflows/test-package.yml
    with:
      package: cms-utils

  cms-react:
    needs: detect-changes
    if: needs.detect-changes.outputs.cms-react == 'true' || needs.detect-changes.outputs.tagged-package == 'cms-react'
    uses: ./.github/workflows/test-package.yml
    with:
      package: cms-react

  publish:
    needs: [detect-changes, cms-utils, cms-react]
    if: always() && needs.detect-changes.outputs.tagged-package != '' && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          registry-url: https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ""

      - name: Install dependencies
        run: npm ci

      - name: Build cms-utils
        run: npm run build --workspace=packages/cms-utils

      - name: Build cms-react
        if: needs.detect-changes.outputs.tagged-package != 'cms-utils'
        run: npm run build --workspace=packages/cms-react

      - name: Publish package
        run: npm publish --provenance --workspace=packages/${{ needs.detect-changes.outputs.tagged-package }}
