name: Deepsel CMS Docker CI/CD Pipeline

on:
  push:
    tags:
      - 'docker-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'DeepselSystems'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$OWNER/$REPO

          # Extract version from tag (docker-v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/docker-v}
          SHA=${GITHUB_SHA::7}

          docker build -t $IMAGE:$VERSION -t $IMAGE:$SHA -t $IMAGE:latest .
          docker push $IMAGE:$VERSION
          docker push $IMAGE:$SHA
          docker push $IMAGE:latest
          echo "Pushed image: $IMAGE:$VERSION"
