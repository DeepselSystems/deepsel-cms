name: Deepsel CMS - Admin CI/CD

on:
  push:
    tags:
      - 'admin-v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Ensure SWC native binding
        run: npm install --no-save @swc/core-linux-x64-gnu@1.15.17 || true

      - name: Build workspace dependencies
        run: |
          npm run build --workspace=packages/cms-utils
          npm run build --workspace=packages/cms-react

      - name: Build library
        run: npm run build:lib --workspace=admin

  publish:
    if: github.repository_owner == 'DeepselSystems'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Ensure SWC native binding
        run: npm install --no-save @swc/core-linux-x64-gnu@1.15.17 || true

      - name: Build workspace dependencies
        run: |
          npm run build --workspace=packages/cms-utils
          npm run build --workspace=packages/cms-react

      - name: Build library
        run: npm run build:lib --workspace=admin

      - name: Update npm
        run: npx npm@latest --version && npx npm@latest install -g npm@latest || true

      - name: Publish package
        run: npm publish --provenance --workspace=admin
